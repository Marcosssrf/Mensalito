spring:
  application:
    name: mensalito

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      url: ${REDIS_URL}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

abacatepay:
  api-key: ${ABACATEPAY_API_KEY}
  base-url: https://api.abacatepay.com/v2
  return-url: ${ABACATEPAY_RETURN_URL}
  completion-url: ${ABACATEPAY_COMPLETION_URL}

encryption:
  secret: ${ENCRYPTION_SECRET}

evolution:
  api-url: ${EVOLUTION_API_URL}
  api-key: ${EVOLUTION_API_KEY}
  instance: ${EVOLUTION_INSTANCE}

app:
  frontend-url: ${FRONTEND_URL}
